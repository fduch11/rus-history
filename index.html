<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f4efe5">
  <title>История Руси</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div><p class="eyebrow">Историческая лента</p><h1>История Руси</h1></div>
    <button id="themeToggle" class="icon-button" type="button" aria-label="Переключить тему">☾</button>
  </header>
  <main>
    <section class="controls" aria-label="Поиск и фильтры">
      <label class="search-box"><span aria-hidden="true">⌕</span><input id="searchInput" type="search" placeholder="Поиск по событиям" autocomplete="off"></label>
      <div id="periodFilters" class="filters" role="group" aria-label="Исторические периоды"></div>
      <label class="favorites-switch"><input id="favoritesOnly" type="checkbox"><span>Только избранное</span></label>
    </section>
    <p id="resultCount" class="result-count" aria-live="polite"></p>
    <section id="timeline" class="timeline" aria-label="Исторические события"></section>
    <div id="emptyState" class="empty-state" hidden><strong>Ничего не найдено</strong><span>Измените запрос или выбранный период.</span></div>
  </main>
  <dialog id="eventModal" class="modal">
    <article class="modal-card">
      <button id="modalClose" class="modal-close" type="button" aria-label="Закрыть">×</button>
      <img id="modalImage" src="images/history.svg" alt="">
      <div class="modal-content"><span id="modalPeriod" class="period-badge"></span><p id="modalYear" class="modal-year"></p><h2 id="modalTitle"></h2><p id="modalDescription"></p><button id="modalFavorite" class="favorite-action" type="button"></button></div>
    </article>
  </dialog>
  <script src="data.js"></script><script src="app.js"></script>
</body>
</html>
